<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Queue - Mogu Visual</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; font-family: system-ui, sans-serif; }
  canvas { display: block; width: 100%; height: 100%; }
  #controls {
    position: fixed; top: 16px; right: 16px; background: rgba(26,26,26,0.92);
    border: 1px solid #333; border-radius: 10px; padding: 14px 18px; z-index: 10;
    min-width: 230px; backdrop-filter: blur(8px);
  }
  #controls h3 { color: #eee; font-size: 14px; margin-bottom: 10px; font-weight: 600; letter-spacing: 0.5px; }
  .mogu-control { display:flex; align-items:center; gap:8px; margin:6px 0; font-size:13px; color:#aaa; }
  .mogu-control label { min-width:100px; text-align:right; color:#aaa; }
  .mogu-control .mogu-value { min-width:36px; text-align:center; color:#eee; font-variant-numeric:tabular-nums; }
  .mogu-control input[type=range] { -webkit-appearance:none; appearance:none; height:4px; background:#333; border-radius:2px; outline:none; flex:1; }
  .mogu-control input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:50%; background:#FF4D4D; cursor:pointer; }
  .mogu-stepper { display:flex; align-items:center; gap:4px; }
  .mogu-stepper button { width:26px; height:26px; border:none; border-radius:4px; background:#333; color:#eee; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
  .mogu-stepper button:hover { background:#FF4D4D; }
  #stats { position: fixed; bottom: 16px; left: 16px; color: #555; font-size: 12px; font-family: 'SF Mono', Monaco, monospace; z-index: 10; }
  #title-overlay {
    position: fixed; bottom: 16px; right: 16px; color: #444; font-size: 11px;
    font-family: 'SF Mono', Monaco, monospace; z-index: 10; text-align: right;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <h3>Message Queue Parameters</h3>
  <div id="ctrl-container"></div>
</div>
<div id="stats"></div>
<div id="title-overlay">Mogu Visual / Message Queue</div>

<script>
// ==========================================================================
// Drawing Helpers (from widgets.js, inlined)
// ==========================================================================
function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function lightenColor(hex, amount) {
  hex = hex.replace('#', '');
  if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
  var r = parseInt(hex.substring(0, 2), 16);
  var g = parseInt(hex.substring(2, 4), 16);
  var b = parseInt(hex.substring(4, 6), 16);
  r = Math.round(r + (255 - r) * amount);
  g = Math.round(g + (255 - g) * amount);
  b = Math.round(b + (255 - b) * amount);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function lerpColor(hex1, hex2, t) {
  var r1 = parseInt(hex1.substring(1, 3), 16), g1 = parseInt(hex1.substring(3, 5), 16), b1 = parseInt(hex1.substring(5, 7), 16);
  var r2 = parseInt(hex2.substring(1, 3), 16), g2 = parseInt(hex2.substring(3, 5), 16), b2 = parseInt(hex2.substring(5, 7), 16);
  var r = Math.round(r1 + (r2 - r1) * t), g = Math.round(g1 + (g2 - g1) * t), b = Math.round(b1 + (b2 - b1) * t);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

var ease = {
  inOut: function(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; },
  out: function(t) { return 1 - Math.pow(1 - t, 3); },
  in: function(t) { return t * t * t; },
  spring: function(t, d) { d = d !== undefined ? d : 0.5; return 1 - Math.exp(-6*t)*Math.cos(t*Math.PI*2*(1+d*3)); }
};

function idleBounce(time, period, amplitude) {
  period = period !== undefined ? period : 2.5;
  amplitude = amplitude !== undefined ? amplitude : 2;
  return Math.sin((time / period) * Math.PI * 2) * amplitude;
}

// --- Expression drawing ---
function drawExpression(ctx, expression, s) {
  var lw = 2.5 * s;
  switch (expression) {
    case 'neutral': default:
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath(); ctx.arc(60*s, 115*s, 4.5*s, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(80*s, 115*s, 4.5*s, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = lw; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(63*s, 127*s); ctx.quadraticCurveTo(70*s, 133*s, 77*s, 127*s); ctx.stroke();
      break;
    case 'curious':
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath(); ctx.arc(60*s, 115*s, 4.5*s, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(80*s, 113*s, 5.5*s, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = lw;
      ctx.beginPath(); ctx.arc(70*s, 129*s, 3.5*s, 0, Math.PI*2); ctx.stroke();
      break;
    case 'processing':
      ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 3*s; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(54*s, 115*s); ctx.lineTo(66*s, 115*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(74*s, 115*s); ctx.lineTo(86*s, 115*s); ctx.stroke();
      ctx.lineWidth = lw;
      ctx.beginPath(); ctx.moveTo(60*s, 128*s);
      ctx.quadraticCurveTo(65*s, 124*s, 70*s, 128*s);
      ctx.quadraticCurveTo(75*s, 132*s, 80*s, 128*s); ctx.stroke();
      break;
    case 'proud':
      ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 3*s; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(55*s, 114*s); ctx.quadraticCurveTo(60*s, 110*s, 65*s, 114*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(75*s, 114*s); ctx.quadraticCurveTo(80*s, 110*s, 85*s, 114*s); ctx.stroke();
      ctx.lineWidth = lw;
      ctx.beginPath(); ctx.moveTo(60*s, 126*s); ctx.quadraticCurveTo(70*s, 136*s, 80*s, 126*s); ctx.stroke();
      break;
    case 'alert':
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(60*s, 113*s, 6*s, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(80*s, 113*s, 6*s, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#0a0a0a';
      ctx.beginPath(); ctx.arc(61*s, 114*s, 3.5*s, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(81*s, 114*s, 3.5*s, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = lw; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(64*s, 129*s); ctx.lineTo(70*s, 124*s); ctx.lineTo(76*s, 129*s); ctx.stroke();
      break;
  }
}

// --- Draw Mogu (with optional capRyOverride for ceremony inflation) ---
function drawMogu(ctx, x, y, size, capColor, expression, capShape, texture, capRyOverride) {
  expression = expression || 'neutral';
  var s = size / 170;
  var offsetX = x - 70 * s;
  var offsetY = y - 85 * s;
  ctx.save();
  ctx.translate(offsetX, offsetY);
  var highlightColor = lightenColor(capColor, 0.2);
  var spotColor = lightenColor(capColor, 0.25);
  var capRy = capRyOverride !== undefined ? capRyOverride * s : 38 * s;
  var capRx = 52 * s;

  // Feet
  ctx.fillStyle = '#EBE0D0';
  ctx.beginPath(); ctx.ellipse(58*s, 145*s, 10*s, 4*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(82*s, 145*s, 10*s, 4*s, 0, 0, Math.PI*2); ctx.fill();
  // Stem
  ctx.fillStyle = '#F5EDE0';
  roundRect(ctx, 50*s, 95*s, 40*s, 50*s, 14*s); ctx.fill();
  // Cap
  if (capShape) {
    capShape(ctx, 70*s, 82*s, capRx, capRy);
    ctx.fillStyle = capColor; ctx.fill();
  } else {
    ctx.fillStyle = capColor;
    ctx.beginPath(); ctx.ellipse(70*s, 82*s, capRx, capRy, 0, 0, Math.PI*2); ctx.fill();
  }
  // Highlight
  ctx.globalAlpha = 0.5; ctx.fillStyle = highlightColor;
  ctx.beginPath(); ctx.ellipse(55*s, 68*s, 18*s, 10*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1.0;
  // Texture / spots
  if (texture) { texture(ctx, 70*s, 82*s, capRx, capRy, spotColor); }
  else {
    ctx.globalAlpha = 0.7; ctx.fillStyle = spotColor;
    ctx.beginPath(); ctx.arc(42*s, 72*s, 6*s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(68*s, 55*s, 5*s, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(90*s, 68*s, 7*s, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1.0;
  }
  // Expression
  drawExpression(ctx, expression, s);
  ctx.restore();
}

// --- Cap shape: Scales (for Broker -- queues, buffers) ---
function scalesTexture(ctx, cx, cy, capRx, capRy, spotColor) {
  ctx.globalAlpha = 0.7; ctx.strokeStyle = spotColor; ctx.lineWidth = capRx * 0.03;
  var rows = 3, cols = 4, scaleW = capRx * 0.3, scaleH = capRy * 0.25;
  for (var row = 0; row < rows; row++) {
    for (var col = 0; col < cols; col++) {
      var x = cx + (col - cols/2 + 0.5) * scaleW * 0.8;
      var y = cy + (row - rows/2 + 0.5) * scaleH * 0.7;
      ctx.beginPath(); ctx.arc(x, y, scaleW * 0.4, 0, Math.PI, true); ctx.stroke();
    }
  }
  ctx.globalAlpha = 1.0;
}

// --- Cap shape: Flat/Shiitake (for Broker) ---
function flatCap(ctx, cx, cy, capRx, capRy) {
  ctx.beginPath();
  ctx.ellipse(cx, cy, capRx, capRy * 0.6, 0, 0, Math.PI * 2);
}

// ==========================================================================
// State
// ==========================================================================
var state = {
  time: 0,
  ceremonyDone: false,
  messageRate: 5,
  consumerCount: 3,
  queueCapacity: 20,
  queue: [],           // messages inside broker
  inflight: [],        // messages animating between actors
  produced: 0,
  consumed: 0,
  nextProduceAt: 0,
  brokerAlert: false,
  brokerAlertPulse: 0
};

// Message object: { x, y, targetX, targetY, progress, phase, consumerId, color }
var MSG_COLORS = ['#FF6B9D', '#FFB84D', '#A3D977', '#7B68EE', '#5BA3E0', '#FF8C42'];

function randomMsgColor() { return MSG_COLORS[Math.floor(Math.random() * MSG_COLORS.length)]; }

// ==========================================================================
// Layout (computed in draw based on canvas size)
// ==========================================================================
function getLayout(w, h) {
  var cx = w / 2, cy = h / 2;
  var producerX = w * 0.12, producerY = cy;
  var brokerX = cx, brokerY = cy - 10;
  var consumers = [];
  var count = state.consumerCount;
  var spacing = Math.min(h * 0.16, 90);
  var totalSpan = (count - 1) * spacing;
  var maxSpan = h * 0.7;
  if (totalSpan > maxSpan) spacing = maxSpan / Math.max(count - 1, 1);
  var startY = brokerY - ((count - 1) / 2) * spacing;
  for (var i = 0; i < count; i++) {
    consumers.push({ x: w * 0.85, y: startY + i * spacing });
  }
  return { producerX: producerX, producerY: producerY, brokerX: brokerX, brokerY: brokerY, consumers: consumers };
}

// ==========================================================================
// Controls
// ==========================================================================
var ctrlEl = document.getElementById('ctrl-container');

function makeSlider(label, min, max, val, step, cb) {
  var row = document.createElement('div'); row.className = 'mogu-control';
  var lbl = document.createElement('label'); lbl.textContent = label;
  var input = document.createElement('input'); input.type = 'range'; input.min = min; input.max = max; input.value = val; input.step = step;
  var v = document.createElement('span'); v.className = 'mogu-value'; v.textContent = val;
  input.addEventListener('input', function() { var n = parseFloat(input.value); v.textContent = n; cb(n); });
  row.appendChild(lbl); row.appendChild(input); row.appendChild(v); ctrlEl.appendChild(row);
}

function makeStepper(label, min, max, val, cb) {
  var row = document.createElement('div'); row.className = 'mogu-control';
  var lbl = document.createElement('label'); lbl.textContent = label;
  var stepper = document.createElement('div'); stepper.className = 'mogu-stepper';
  var btnM = document.createElement('button'); btnM.textContent = '\u2212';
  var valEl = document.createElement('span'); valEl.className = 'mogu-value'; valEl.textContent = val;
  var btnP = document.createElement('button'); btnP.textContent = '+';
  var cur = val;
  function upd(v) { cur = Math.max(min, Math.min(max, v)); valEl.textContent = cur; cb(cur); }
  btnM.addEventListener('click', function() { upd(cur - 1); });
  btnP.addEventListener('click', function() { upd(cur + 1); });
  stepper.appendChild(btnM); stepper.appendChild(valEl); stepper.appendChild(btnP);
  row.appendChild(lbl); row.appendChild(stepper); ctrlEl.appendChild(row);
}

makeSlider('Message Rate', 1, 30, 5, 1, function(v) { state.messageRate = v; });
makeStepper('Consumers', 1, 5, 3, function(v) { state.consumerCount = v; });
makeSlider('Queue Capacity', 10, 50, 20, 1, function(v) { state.queueCapacity = v; });

// ==========================================================================
// Absorption Ceremony keywords
// ==========================================================================
var keywords = ['producer', 'broker', 'queue', 'consumer', 'FIFO', 'async'];
var kwState = keywords.map(function(kw, i) {
  return { text: kw, alpha: 0, offsetX: 120, scale: 1, active: true, delay: i * 0.1 };
});

// ==========================================================================
// Update
// ==========================================================================
function update(dt) {
  state.time += dt;
  var t = state.time;

  // --- Ceremony phase (first 3 seconds) ---
  if (t < 3.0) {
    // Keywords animate in during Notice phase (0.8-1.5)
    if (t >= 0.8 && t < 1.5) {
      for (var i = 0; i < kwState.length; i++) {
        var kw = kwState[i];
        var elapsed = t - 0.8 - kw.delay;
        if (elapsed > 0) {
          var p = Math.min(elapsed / 0.5, 1);
          kw.alpha = ease.out(p);
          kw.offsetX = 120 * (1 - ease.out(p));
        }
      }
    }
    // Keywords get swallowed during Swallow phase (1.5-2.2)
    if (t >= 1.5 && t < 2.2) {
      for (var i = 0; i < kwState.length; i++) {
        var kw = kwState[i];
        var p = Math.min((t - 1.5) / 0.7, 1);
        kw.scale = 1 - ease.in(p);
        kw.alpha = 1 - ease.in(p);
      }
    }
    return;
  }

  if (!state.ceremonyDone) { state.ceremonyDone = true; state.nextProduceAt = t; }

  // --- Main simulation ---
  var layout = getLayout(window.innerWidth, window.innerHeight);

  // Produce messages at rate
  var interval = 1.0 / state.messageRate;
  if (t >= state.nextProduceAt && state.queue.length < state.queueCapacity) {
    // Spawn inflight message from producer to broker
    var sx = layout.producerX + 30, sy = layout.producerY;
    state.inflight.push({
      x: sx, y: sy,
      startX: sx, startY: sy,
      targetX: layout.brokerX - 40, targetY: layout.brokerY,
      progress: 0, phase: 'to-broker', consumerId: -1,
      color: randomMsgColor()
    });
    state.produced++;
    state.nextProduceAt = t + interval;
  }
  // Also produce if time has passed even if queue was full (try again)
  if (t >= state.nextProduceAt) { state.nextProduceAt = t + interval; }

  // Alert state
  var fillRatio = state.queue.length / state.queueCapacity;
  state.brokerAlert = fillRatio >= 0.85;
  if (state.brokerAlert) { state.brokerAlertPulse += dt * 4; }

  // Update inflight messages
  for (var i = state.inflight.length - 1; i >= 0; i--) {
    var msg = state.inflight[i];
    msg.progress += dt * 1.8; // speed of travel

    if (msg.phase === 'to-broker' && msg.progress >= 1) {
      // Arrived at broker - add to queue
      if (state.queue.length < state.queueCapacity) {
        state.queue.push({ color: msg.color, age: 0 });
      }
      state.inflight.splice(i, 1);
      continue;
    }

    if (msg.phase === 'to-consumer' && msg.progress >= 1) {
      state.consumed++;
      state.inflight.splice(i, 1);
      continue;
    }

    // Interpolate position
    var p = Math.min(msg.progress, 1);
    var ep = ease.inOut(p);
    msg.x = msg.startX + (msg.targetX - msg.startX) * ep;
    msg.y = msg.startY + (msg.targetY - msg.startY) * ep;
    // Arc
    msg.y -= Math.sin(p * Math.PI) * 20;
  }

  // Dispatch from queue to consumers (round-robin)
  // Consumer pull timers are stored in state to persist across frames
  if (!state.consumerPullTimers) state.consumerPullTimers = [];
  if (state.queue.length > 0) {
    for (var c = 0; c < state.consumerCount; c++) {
      if (state.queue.length === 0) break;
      var consumer = layout.consumers[c];
      if (!consumer) continue;
      if (!state.consumerPullTimers[c]) state.consumerPullTimers[c] = t + 0.3 + Math.random() * 0.3;
      if (t >= state.consumerPullTimers[c]) {
        var qmsg = state.queue.shift();
        var bsx = layout.brokerX + 40, bsy = layout.brokerY;
        state.inflight.push({
          x: bsx, y: bsy,
          startX: bsx, startY: bsy,
          targetX: consumer.x - 30, targetY: consumer.y,
          progress: 0, phase: 'to-consumer', consumerId: c,
          color: qmsg.color
        });
        state.consumerPullTimers[c] = t + 0.3 + Math.random() * 0.2;
      }
    }
  }
}

// ==========================================================================
// Draw
// ==========================================================================
function draw(ctx, w, h) {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, w, h);

  var t = state.time;
  var layout = getLayout(w, h);

  // --- Ceremony (first 3 seconds): single Mogu center-stage ---
  if (t < 3.0) {
    var cx = w / 2, cy = h / 2;
    var bounce = idleBounce(t, 2.5, 2);
    var expr = 'neutral';
    var capColor = '#FF4D4D';
    var capRy = 38;

    if (t >= 0.8 && t < 1.5) expr = 'curious';
    if (t >= 1.5 && t < 2.2) {
      expr = 'processing';
      var st = (t - 1.5) / 0.7;
      var inf = ease.spring(Math.min(st, 1), 0.5);
      capRy = 38 * (1 + 0.15 * inf);
    }
    if (t >= 2.2) {
      expr = 'proud';
      var ct = Math.min((t - 2.2) / 0.5, 1);
      capColor = lerpColor('#FF4D4D', '#5680E0', ease.out(ct));
      // Deflate back
      var dt2 = Math.min((t - 2.2) / 0.3, 1);
      capRy = 38 * (1 + 0.15 * (1 - ease.out(dt2)));
      // Final hop
      if (t >= 2.5 && t < 2.7) {
        bounce -= Math.sin(((t - 2.5) / 0.2) * Math.PI) * 6;
      }
    }

    drawMogu(ctx, cx, cy + bounce, 120, capColor, expr, null, null, capRy);

    // Draw keywords (right of character)
    if (t >= 0.8) {
      ctx.font = "16px 'SF Mono', Monaco, monospace";
      ctx.textAlign = 'left';
      for (var i = 0; i < kwState.length; i++) {
        var kw = kwState[i];
        if (kw.alpha <= 0) continue;
        ctx.globalAlpha = kw.alpha;
        ctx.fillStyle = '#aaa';
        ctx.save();
        var kx = cx + 80 + kw.offsetX;
        var ky = cy - 50 + i * 26;
        ctx.translate(kx, ky);
        ctx.scale(kw.scale, kw.scale);
        ctx.fillText(kw.text, 0, 0);
        ctx.restore();
      }
      ctx.globalAlpha = 1.0;
    }

    // Phase label
    ctx.fillStyle = '#555';
    ctx.font = '12px system-ui, sans-serif';
    ctx.textAlign = 'center';
    var phase = t < 0.8 ? 'idle' : t < 1.5 ? 'notice' : t < 2.2 ? 'swallow' : 'ready';
    ctx.fillText('Absorption Ceremony: ' + phase, cx, h - 30);
    return;
  }

  // --- Main visualization ---
  var lo = layout;

  // Draw connection lines (arrows)
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2;
  ctx.setLineDash([6, 4]);
  // Producer -> Broker
  ctx.beginPath();
  ctx.moveTo(lo.producerX + 35, lo.producerY);
  ctx.lineTo(lo.brokerX - 50, lo.brokerY);
  ctx.stroke();
  // Broker -> Consumers
  for (var i = 0; i < lo.consumers.length; i++) {
    ctx.beginPath();
    ctx.moveTo(lo.brokerX + 50, lo.brokerY);
    ctx.lineTo(lo.consumers[i].x - 35, lo.consumers[i].y);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Draw arrowheads
  ctx.fillStyle = '#333';
  drawArrow(ctx, lo.brokerX - 52, lo.brokerY, 0);
  for (var i = 0; i < lo.consumers.length; i++) {
    var dx = lo.consumers[i].x - 35 - (lo.brokerX + 50);
    var dy = lo.consumers[i].y - lo.brokerY;
    var angle = Math.atan2(dy, dx);
    drawArrow(ctx, lo.consumers[i].x - 37, lo.consumers[i].y, angle);
  }

  // Draw queue visualization (bar near broker)
  var queueBarX = lo.brokerX - 35;
  var queueBarY = lo.brokerY + 55;
  var queueBarW = 70;
  var queueBarH = 14;
  var fillRatio = state.queue.length / state.queueCapacity;

  // Queue bar background
  ctx.fillStyle = '#1a1a1a';
  roundRect(ctx, queueBarX, queueBarY, queueBarW, queueBarH, 3);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Queue fill
  var fillColor = fillRatio < 0.5 ? '#52C77A' : fillRatio < 0.85 ? '#FFB84D' : '#FF4D4D';
  if (fillRatio > 0) {
    roundRect(ctx, queueBarX + 1, queueBarY + 1, (queueBarW - 2) * fillRatio, queueBarH - 2, 2);
    ctx.fillStyle = fillColor;
    ctx.fill();
  }

  // Queue count (inside the bar)
  ctx.fillStyle = fillRatio > 0.5 ? '#fff' : '#999';
  ctx.font = '9px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(state.queue.length + '/' + state.queueCapacity, lo.brokerX, queueBarY + queueBarH / 2);
  ctx.textBaseline = 'alphabetic';

  // Draw stacked message pills inside queue bar (not above it)
  var pillW = 6, pillH = 4, pillCols = 8;
  var maxVisiblePills = pillCols * 2; // max 2 rows, rest just shown by the fill bar
  var visibleCount = Math.min(state.queue.length, maxVisiblePills);
  var pillStartX = lo.brokerX - (pillCols * (pillW + 2)) / 2;
  var pillStartY = queueBarY - 10;
  for (var i = 0; i < visibleCount; i++) {
    var col = i % pillCols;
    var row = Math.floor(i / pillCols);
    var px = pillStartX + col * (pillW + 2);
    var py = pillStartY - row * (pillH + 2);
    ctx.fillStyle = state.queue[i].color;
    ctx.globalAlpha = 0.7;
    roundRect(ctx, px, py, pillW, pillH, 1.5);
    ctx.fill();
  }
  ctx.globalAlpha = 1.0;

  // Draw inflight messages (animated dots)
  for (var i = 0; i < state.inflight.length; i++) {
    var msg = state.inflight[i];
    ctx.fillStyle = msg.color;
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.arc(msg.x, msg.y, 5, 0, Math.PI * 2);
    ctx.fill();
    // Glow
    ctx.globalAlpha = 0.25;
    ctx.beginPath();
    ctx.arc(msg.x, msg.y, 9, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1.0;

  // Draw Producer Mogu (small, red, classic dome)
  var pBounce = idleBounce(t, 2.2, 2);
  drawMogu(ctx, lo.producerX, lo.producerY + pBounce, 65, '#FF4D4D', 'neutral');

  // Draw Broker Mogu (large, blue, flat cap, scales texture)
  var bBounce = idleBounce(t, 2.8, 2.5);
  var brokerExpr = state.brokerAlert ? 'alert' : 'processing';
  var brokerColor = '#5680E0';
  var brokerSize = 100;

  // Cap pulse when alert
  var brokerCapRy = 38;
  if (state.brokerAlert) {
    brokerCapRy = 38 + Math.sin(state.brokerAlertPulse) * 3;
    // Tint broker toward red when overloaded
    brokerColor = lerpColor('#5680E0', '#FF4D4D', 0.3 + Math.sin(state.brokerAlertPulse) * 0.15);
  }

  drawMogu(ctx, lo.brokerX, lo.brokerY + bBounce, brokerSize, brokerColor, brokerExpr, flatCap, scalesTexture, brokerCapRy);

  // Draw Consumer Mogus (small, green, classic dome)
  for (var i = 0; i < lo.consumers.length; i++) {
    var c = lo.consumers[i];
    var cBounce = idleBounce(t + i * 0.7, 2.0 + i * 0.3, 2);
    // Consumers pulse proud momentarily when they receive a message
    var cExpr = 'neutral';
    // Check if any message was just delivered to this consumer
    for (var j = 0; j < state.inflight.length; j++) {
      if (state.inflight[j].consumerId === i && state.inflight[j].progress > 0.7) {
        cExpr = 'curious';
      }
    }
    drawMogu(ctx, c.x, c.y + cBounce, 55, '#52C77A', cExpr);
  }

  // Labels — positioned below each Mogu with enough clearance
  ctx.fillStyle = '#555';
  ctx.font = '11px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Producer', lo.producerX, lo.producerY + 50);
  ctx.fillText('Broker', lo.brokerX, queueBarY + queueBarH + 16);
  for (var i = 0; i < lo.consumers.length; i++) {
    ctx.fillText('C' + (i + 1), lo.consumers[i].x, lo.consumers[i].y + 42);
  }

  // Stats overlay
  document.getElementById('stats').textContent =
    'Produced: ' + state.produced + '  |  Queued: ' + state.queue.length + '  |  Consumed: ' + state.consumed;
}

function drawArrow(ctx, x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-8, -4);
  ctx.lineTo(-8, 4);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

// ==========================================================================
// Game Loop (from widgets.js)
// ==========================================================================
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var running = true, lastTime = 0;

function resize() {
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function tick(timestamp) {
  if (!running) return;
  var dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.05) : 0;
  lastTime = timestamp;
  var rect = canvas.getBoundingClientRect();
  update(dt);
  ctx.clearRect(0, 0, rect.width, rect.height);
  draw(ctx, rect.width, rect.height);
  requestAnimationFrame(tick);
}

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(tick);
</script>
