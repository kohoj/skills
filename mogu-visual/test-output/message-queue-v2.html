<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Message Queue — Mogu Visual</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; }
    canvas { display:block; width:100%; height:100%; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="../components/mogu-engine.js"></script>
<script>
// ============================================================
// Message Queue Visualization — MoguScene Engine
// Producer -> Broker (queue) -> Consumers (round-robin)
// ============================================================

var scene = new MoguScene(document.getElementById('c'), {
  background: '#0a0a0a',
  title: 'Message Queue'
});

// --- Actors ---
scene.addActor('producer', {
  label: 'Producer',
  x: 0.15, y: 0.5,
  size: 65,
  cap: { color: '#FF4D4D', shape: 'dome' },
  bouncePhase: 0
});

scene.addActor('broker', {
  label: 'Broker',
  x: 0.50, y: 0.5,
  size: 120,
  cap: { color: '#3068B0', shape: 'flat', texture: 'scales' },
  bouncePeriod: 3.0,
  bouncePhase: 0.5
});

// Start with 3 consumers (will be dynamically managed)
function createConsumer(index, total) {
  var id = 'consumer' + index;
  var yPos = 0.3 + (index / (total - 1)) * 0.4; // Spread vertically from 0.3 to 0.7
  if (total === 1) yPos = 0.5; // Center if only one

  scene.addActor(id, {
    label: 'Consumer',
    x: 0.85, y: yPos,
    size: 60,
    cap: { color: '#3A8860', shape: 'dome' },
    bouncePhase: index * 0.3
  });

  scene.connect('broker', id, { style: 'dashed' });
}

// Initialize with 3 consumers
for (var i = 0; i < 3; i++) createConsumer(i, 3);

// --- Connections ---
scene.connect('producer', 'broker', { style: 'dashed' });

// --- Controls ---
scene.addParam({ id: 'rate', label: 'Message Rate', type: 'slider', min: 1, max: 30, value: 5, step: 1 });
scene.addParam({ id: 'consumers', label: 'Consumers', type: 'stepper', min: 1, max: 5, value: 3 });
scene.addParam({ id: 'capacity', label: 'Queue Cap', type: 'slider', min: 10, max: 50, value: 20, step: 5 });

// --- Scene logic ---
var produced = 0, consumed = 0;
var nextEmitAt = 0;
var queue = [];
var nextConsumerIdx = 0;
var prevConsumerCount = 3;
var COLORS = ['#FF6B9D', '#FFB84D', '#A3D977', '#7B68EE', '#5BA3E0', '#FF8C42'];

scene.onUpdate(function (dt, time) {
  var rate = scene.param('rate');
  var consumerCount = scene.param('consumers');
  var capacity = scene.param('capacity');
  var interval = 1.0 / rate;

  // Handle dynamic consumer count changes
  if (consumerCount !== prevConsumerCount) {
    // Remove all existing consumers
    for (var i = 0; i < prevConsumerCount; i++) {
      var id = 'consumer' + i;
      scene.disconnect('broker', id);
      scene.removeActor(id);
    }
    // Add new consumers
    for (var i = 0; i < consumerCount; i++) {
      createConsumer(i, consumerCount);
    }
    nextConsumerIdx = nextConsumerIdx % consumerCount;
    prevConsumerCount = consumerCount;
  }

  // Producer: emit messages
  if (time >= nextEmitAt && queue.length < capacity) {
    var color = COLORS[produced % COLORS.length];
    scene.spawnItem({
      from: 'producer', to: 'broker',
      color: color, speed: 1.5, arc: 25, glow: true,
      onArrive: function (item) {
        // Add to queue
        queue.push({ color: item.color, arrivedAt: time });
        scene.setExpression('producer', 'neutral');
      }
    });
    produced++;
    scene.setExpression('producer', 'curious');
    nextEmitAt = time + interval;
  }

  // Broker: check queue fullness and set expression
  var queuePercent = queue.length / capacity;
  if (queuePercent > 0.85) {
    scene.setExpression('broker', 'alert');
  } else if (queue.length > 0) {
    scene.setExpression('broker', 'processing');
  } else {
    scene.setExpression('broker', 'neutral');
  }

  // Broker: dispatch messages to consumers (round-robin)
  if (queue.length > 0) {
    var targetId = 'consumer' + nextConsumerIdx;
    var targetActor = scene.getActor(targetId);

    if (targetActor) {
      var msg = queue.shift();
      scene.spawnItem({
        from: 'broker', to: targetId,
        color: msg.color, speed: 1.2, arc: 20, glow: true,
        onArrive: function () {
          consumed++;
          scene.setExpression(targetId, 'curious');
          setTimeout(function () {
            if (scene.getActor(targetId)) {
              scene.setExpression(targetId, 'neutral');
            }
          }, 400);
        }
      });

      // Move to next consumer (round-robin)
      nextConsumerIdx = (nextConsumerIdx + 1) % consumerCount;
    }
  }

  // Stats
  scene.setStat('Produced', produced);
  scene.setStat('Queued', queue.length);
  scene.setStat('Consumed', consumed);
});

// Custom draw: queue visualization under broker
scene.onDraw(function (ctx, w, h, time) {
  var capacity = scene.param('capacity');
  var broker = scene.getActor('broker');
  if (!broker) return;

  var pos = scene.getActorPos('broker');
  var queueBarWidth = 100;
  var queueBarHeight = 12;
  var queueX = pos.x - queueBarWidth / 2;
  var queueY = pos.y + broker.size * 0.35 + 20;

  // Background bar
  ctx.fillStyle = '#222';
  ctx.fillRect(queueX, queueY, queueBarWidth, queueBarHeight);

  // Queue fill
  if (queue.length > 0) {
    var fillWidth = (queue.length / capacity) * queueBarWidth;
    var queuePercent = queue.length / capacity;
    var fillColor = queuePercent > 0.85 ? '#FF4D4D' : queuePercent > 0.5 ? '#FFB84D' : '#3A8860';

    ctx.fillStyle = fillColor;
    ctx.fillRect(queueX, queueY, fillWidth, queueBarHeight);
  }

  // Border
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1;
  ctx.strokeRect(queueX, queueY, queueBarWidth, queueBarHeight);

  // Queue label
  ctx.fillStyle = '#666';
  ctx.font = '10px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(queue.length + ' / ' + capacity, pos.x, queueY + queueBarHeight + 12);
});

// --- Start with absorption ceremony ---
scene.start(['producer', 'broker', 'queue', 'consumer', 'FIFO', 'async'], '#3068B0');
</script>
</body>
</html>
